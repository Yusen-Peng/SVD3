7scenes-sparse:
  cfg:
    _target_: datasets.sevenscenes.SevenScenes
    split: test
    SEVENSCENES_DIR: /data/wanghaoxuan/yusen_stuff/7scenes
    load_img_size: ${load_img_size}
    cache_file: /data/wanghaoxuan/yusen_stuff/dataset_cache/7scenes_mv_recon_cache.npy
  sampling:
    strategy: stride
    kf_every: 200  # ori setting in cut3r
  seq_id_map: /data/wanghaoxuan/yusen_stuff/SVD-pi3/7scenes_mv-recon_seq-id-map-kf200.json

